<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tatva College Fest AI Assistant</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <div class="fest-logo">T</div>
        <div>
          <h1>Tatva Fest AI</h1>
          <div class="status-indicator">
            <span class="pulse-dot"></span> Online Assistant
          </div>
        </div>
      </div>
      <button class="clear-btn" id="clearBtn" title="Clear Chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
      </button>
    </header>

    <main class="chat-area" id="chatArea">
      <!-- Welcome Panel -->
      <div class="welcome-container" id="welcomeContainer">
        <div class="welcome-icon">🔮</div>
        <h2>Ask Tatva Fest AI</h2>
        <p>Your instant guide to event rules, timelines, announcements, and scores.</p>
        <div class="suggestions-grid">
          <button class="suggestion-chip">🤼‍♂️ Team size for Tug of War?</button>
          <button class="suggestion-chip">📅 What events are happening today?</button>
          <button class="suggestion-chip">🏆 Who is winning the Volleyball match?</button>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <form class="input-form" id="chatForm">
        <input type="text" id="questionInput" placeholder="Ask anything about Tatva..." autocomplete="off">
        <button type="submit" class="send-btn" id="sendBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </footer>
  </div>

  <script>
    const chatForm = document.getElementById('chatForm');
    const questionInput = document.getElementById('questionInput');
    const chatArea = document.getElementById('chatArea');
    const welcomeContainer = document.getElementById('welcomeContainer');
    const clearBtn = document.getElementById('clearBtn');
    const suggestionChips = document.querySelectorAll('.suggestion-chip');

    function appendMessage(text, sender, isError = false) {
      if (welcomeContainer) {
        welcomeContainer.style.display = 'none';
      }

      const bubble = document.createElement('div');
      bubble.classList.add('message-bubble', sender);
      if (isError) bubble.classList.add('error');

      const content = document.createElement('div');
      content.classList.add('message-content');
      content.textContent = text;

      bubble.appendChild(content);
      chatArea.appendChild(bubble);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTypingIndicator() {
      const bubble = document.createElement('div');
      bubble.classList.add('message-bubble', 'bot', 'typing-indicator-bubble');
      bubble.id = 'typingIndicator';

      const indicator = document.createElement('div');
      indicator.classList.add('typing-indicator');
      indicator.innerHTML = '<span></span><span></span><span></span>';

      bubble.appendChild(indicator);
      chatArea.appendChild(bubble);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) {
        indicator.remove();
      }
    }

    async function sendQuestion(question) {
      if (!question.trim()) return;

      appendMessage(question, 'user');
      showTypingIndicator();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ question })
        });

        const data = await response.json();
        removeTypingIndicator();

        if (response.ok) {
          appendMessage(data.answer, 'bot');
        } else {
          appendMessage(data.message || 'Error occurred while processing request.', 'bot', true);
        }
      } catch (err) {
        removeTypingIndicator();
        appendMessage('Failed to connect to the assistant server.', 'bot', true);
      }
    }

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const question = questionInput.value;
      if (question.trim()) {
        sendQuestion(question);
        questionInput.value = '';
      }
    });

    clearBtn.addEventListener('click', () => {
      const bubbles = chatArea.querySelectorAll('.message-bubble');
      bubbles.forEach(b => b.remove());
      if (welcomeContainer) {
        welcomeContainer.style.display = 'flex';
      }
    });

    suggestionChips.forEach(chip => {
      chip.addEventListener('click', () => {
        const question = chip.textContent.substring(2).trim(); // strip icon prefix
        sendQuestion(question);
      });
    });
  </script>
</body>
</html>
